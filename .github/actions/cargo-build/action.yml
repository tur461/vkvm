name: "Cargo Build"

description: "Build Rust application"

inputs:
  profile:
    description: "Build profile"
    required: false
    default: release

outputs:
  binary-path:
    description: "Binary output path"
    value: target/${{ inputs.profile }}

runs:
  using: composite

  steps:
    - name: Show Runner Information
      shell: bash
      run: |
        echo "Repository : $GITHUB_REPOSITORY"
        echo "Branch : $GITHUB_REF"
        echo "Commit : $GITHUB_SHA"
        echo "Runner : $RUNNER_NAME"
        echo "OS: $RUNNER_OS"
        echo "Arch: $RUNNER_ARCH"
        echo "Workflow : $GITHUB_WORKFLOW"
        echo "Job : $GITHUB_JOB"

    - name: Show Rust Version
      shell: bash
      run: |
        rustc --version
        cargo --version

    - name: Verify Cargo.toml
      shell: bash
      run: |
        if [ ! -f Cargo.toml ]; then

            echo "Cargo.toml missing"

            exit 1

        fi
    - name: Build Project
      shell: bash
      env:
        BUILD_PROFILE: ${{ inputs.profile }}
      run: |
        chmod +x "${{ github.action_path }}/build.sh"
        "${{ github.action_path }}/build.sh"
